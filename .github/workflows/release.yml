name: Release to Docker Hub

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    name: Build and Push to Docker Hub
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=latest
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${{ github.sha:0:7 }}" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/siggap-frontend:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/siggap-frontend:${{ steps.version.outputs.SHORT_SHA }}
            ${{ secrets.DOCKER_USERNAME }}/siggap-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/siggap-backend:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/siggap-backend:${{ steps.version.outputs.SHORT_SHA }}
            ${{ secrets.DOCKER_USERNAME }}/siggap-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## Images Pushed
            - `${{ secrets.DOCKER_USERNAME }}/siggap-frontend:${{ steps.version.outputs.VERSION }}`
            - `${{ secrets.DOCKER_USERNAME }}/siggap-backend:${{ steps.version.outputs.VERSION }}`
          draft: false
          prerelease: false
