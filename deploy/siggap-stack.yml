version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: siggap_dev
    volumes:
      - siggap_pgdata:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: siggap-backend:latest
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/siggap_dev
      PORT: 5000
      FRONTEND_URL: https://gabinete.rlautomacoes.com
    networks:
      - RLauto
      - internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.siggap_api.rule=Host(`gabinete.rlautomacoes.com`) && (PathPrefix(`/api`) || PathPrefix(`/health`))
        - traefik.http.routers.siggap_api.entrypoints=websecure
        - traefik.http.routers.siggap_api.tls.certresolver=letsencryptresolver
        - traefik.http.routers.siggap_api.priority=2
        - traefik.http.services.siggap_api.loadbalancer.server.port=5000
        - traefik.http.services.siggap_api.loadbalancer.passHostHeader=true
    command: >
      sh -c "npx prisma db push --skip-generate && npm start"

  frontend:
    image: siggap-frontend:latest
    networks:
      - RLauto
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.siggap_front.rule=Host(`gabinete.rlautomacoes.com`)
        - traefik.http.routers.siggap_front.entrypoints=websecure
        - traefik.http.routers.siggap_front.tls.certresolver=letsencryptresolver
        - traefik.http.routers.siggap_front.priority=1
        - traefik.http.services.siggap_front.loadbalancer.server.port=3000
        - traefik.http.services.siggap_front.loadbalancer.passHostHeader=true

networks:
  RLauto:
    external: true
  internal:
    driver: overlay

volumes:
  siggap_pgdata:
